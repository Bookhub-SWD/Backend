tags:
  - name: Books
    description: Book management endpoints

paths:
  /books:
    get:
      summary: Get all books, filtered by title, code, or category
      tags: [Books]
      parameters:
        - in: query
          name: title
          schema: { type: string }
          description: Filter by book title
        - in: query
          name: subject_code
          schema: { type: string }
          description: Filter by subject code (e.g. PRF192)
        - in: query
          name: category
          schema: { type: string }
          description: Filter by subject category (e.g. SE, AI)
      responses:
        '200':
          description: List of books
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Book' } }

    post:
      summary: Create a new book
      tags: [Books]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                author: { type: string }
                publisher: { type: string }
                isbn: { type: integer }
                keyword: { type: array, items: { type: string } }
                description: { type: string }
                url_img: { type: string }
                library_id: { type: integer, default: 2 }
                subjects:
                  type: array
                  items:
                    type: object
                    properties:
                      code: { type: string }
                      name: { type: string }
                      category: { type: string }
      responses:
        '201':
          description: Book created
        '400':
          description: Invalid input

  /books/search:
    get:
      summary: Search books by keyword
      tags: [Books]
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
          description: Keyword to search for in the book's keyword array
      responses:
        '200':
          description: List of books matching the keyword
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Book' } }

  /books/{id}:
    get:
      summary: Get book details with reviews and average score
      tags: [Books]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Detailed book info
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Book'
                      - type: object
                        properties:
                          reviews:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: integer }
                                content: { type: string }
                                score: { type: integer }
                                user:
                                  type: object
                                  properties:
                                    full_name: { type: string }
                          average_score: { type: number }
                          total_reviews: { type: integer }
                          total_copies: { type: integer }
                          available_copies: { type: integer }
                          copies:
                            type: array
                            items:
                              $ref: '#/components/schemas/BookCopy'

    put:
      summary: Update a book
      tags: [Books]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                author: { type: string }
                subjects:
                  type: array
                  items:
                    type: object
                    properties:
                      code: { type: string }
                      name: { type: string }
      responses:
        '200':
          description: Book updated

    delete:
      summary: Delete a book
      tags: [Books]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Book deleted

components:
  schemas:
    Book:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        author: { type: string }
        publisher: { type: string }
        isbn: { type: integer }
        keyword: { type: array, items: { type: string } }
        description: { type: string }
        created_at: { type: string, format: date-time }
        url_img: { type: string }
        total_copies: { type: integer }
        available_copies: { type: integer }
        library:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
            location: { type: string }
        book_subjects:
          type: array
          items:
            type: object
            properties:
              subject:
                type: object
                properties:
                  code: { type: string }
                  name: { type: string }
                  category: { type: string }
    
    BookCopy:
      type: object
      properties:
        id: { type: integer }
        barcode: { type: string }
        status: { type: string }
        condition: { type: string }
        created_at: { type: string, format: date-time }
