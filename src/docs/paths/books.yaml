tags:
  - name: Books
    description: Book management endpoints

paths:
  /books:
    get:
      summary: Get all books, optionally filtered by subject
      tags: [Books]
      parameters:
        - in: query
          name: subject
          schema:
            type: string
          required: false
          description: Partial match on subject code or name
      responses:
        '200':
          description: List of books
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data: { type: array, items: { $ref: '#/components/schemas/Book' } }

    post:
      summary: Create a new book
      tags: [Books]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                author: { type: string }
                publisher: { type: string }
                isbn: { type: integer }
                keyword: { type: array, items: { type: string } }
                description: { type: string }
                url_img: { type: string }
                library_id: { type: integer, default: 2 }
                subjects:
                  type: array
                  items:
                    type: object
                    properties:
                      code: { type: string }
                      name: { type: string }
                      category: { type: string }
      responses:
        '201':
          description: Book created
        '400':
          description: Invalid input

  /books/{id}:
    put:
      summary: Update a book
      tags: [Books]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                author: { type: string }
                subjects:
                  type: array
                  items:
                    type: object
                    properties:
                      code: { type: string }
                      name: { type: string }
      responses:
        '200':
          description: Book updated

    delete:
      summary: Delete a book
      tags: [Books]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Book deleted

components:
  schemas:
    Book:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        author: { type: string }
        publisher: { type: string }
        isbn: { type: integer }
        keyword: { type: array, items: { type: string } }
        description: { type: string }
        created_at: { type: string, format: date-time }
        url_img: { type: string }
        library:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
        book_subjects:
          type: array
          items:
            type: object
            properties:
              subject:
                type: object
                properties:
                  code: { type: string }
                  name: { type: string }
