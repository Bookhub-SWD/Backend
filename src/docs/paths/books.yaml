tags:
  - name: Books
    description: Book management endpoints

paths:
  /books:
    get:
      summary: Get all books, optionally filtered by subject
      description: >
        Returns a list of books. If the `subject` query parameter is provided,
        returns only books linked to subjects whose **code** or **name** partially
        matches the input (case-insensitive). If omitted, returns all books.
      tags: [Books]
      parameters:
        - in: query
          name: subject
          schema:
            type: string
          required: false
          description: Partial match on subject code or name (e.g. "PRF", "192", "Programming")
          example: PRF
      responses:
        '200':
          description: List of books
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        author:
                          type: string
                        publisher:
                          type: string
                        isbn:
                          type: integer
                        keyword:
                          type: array
                          items:
                            type: string
                        description:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        url_img:
                          type: string
                        library:
                          type: object
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            location:
                              type: string
                        book_subjects:
                          type: array
                          items:
                            type: object
                            properties:
                              subject:
                                type: object
                                properties:
                                  code:
                                    type: string
                                  name:
                                    type: string
                                  category:
                                    type: string
              example:
                ok: true
                data:
                  - id: 1
                    title: "Clean Code"
                    author: "Robert C. Martin"
                    publisher: "Prentice Hall"
                    isbn: 9780132350884
                    keyword: ["clean", "refactoring"]
                    description: "A handbook of agile software craftsmanship."
                    created_at: "2024-01-15T07:00:00Z"
                    url_img: "https://example.com/clean-code.jpg"
                    library:
                      id: 1
                      name: "FPT Library"
                      location: "Building A, Floor 2"
                    book_subjects:
                      - subject:
                          code: "PRF192"
                          name: "Programming Fundamentals"
                          category: "SE"
        '500':
          description: Internal server error
