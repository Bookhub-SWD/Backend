paths:
  /events:
    get:
      tags:
        - Events
      summary: Get all events
      description: List events with optional filters by status and search keyword. Supports pagination.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [upcoming, ongoing, completed, cancelled]
          description: Filter by event status
        - in: query
          name: search
          schema:
            type: string
          description: Search by event title
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        200:
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total_items:
                        type: integer
                      total_pages:
                        type: integer
    post:
      tags:
        - Events
      summary: Create a new event
      description: Create a new event (admin/staff only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - start_time
                - end_time
              properties:
                title:
                  type: string
                  description: Event title
                description:
                  type: string
                  description: Event description
                location:
                  type: string
                  description: Event location
                banner_url:
                  type: string
                  description: Banner image URL
                max_participants:
                  type: integer
                  description: Maximum number of participants
                start_time:
                  type: string
                  format: date-time
                  description: Event start time
                end_time:
                  type: string
                  format: date-time
                  description: Event end time
      responses:
        201:
          description: Event created successfully
        400:
          description: Bad request
        401:
          description: Unauthorized
        403:
          description: Forbidden

  /events/{id}:
    get:
      tags:
        - Events
      summary: Get event detail
      description: Get detailed information about a specific event including registrations
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Event ID
      responses:
        200:
          description: Event detail
        404:
          description: Event not found
    put:
      tags:
        - Events
      summary: Update an event
      description: Update an existing event (admin/staff only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Event ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                location:
                  type: string
                banner_url:
                  type: string
                max_participants:
                  type: integer
                start_time:
                  type: string
                  format: date-time
                end_time:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [upcoming, ongoing, completed, cancelled]
      responses:
        200:
          description: Event updated successfully
        400:
          description: Bad request
        401:
          description: Unauthorized
        403:
          description: Forbidden
    delete:
      tags:
        - Events
      summary: Delete an event
      description: Delete an event (admin/staff only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Event ID
      responses:
        200:
          description: Event deleted successfully
        401:
          description: Unauthorized
        403:
          description: Forbidden

  /events/{id}/register:
    post:
      tags:
        - Events
      summary: Register for an event
      description: Register the authenticated user for an event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Event ID
      responses:
        201:
          description: Registered successfully
        400:
          description: Already registered or event is full
        401:
          description: Unauthorized
        404:
          description: Event not found
    delete:
      tags:
        - Events
      summary: Cancel event registration
      description: Cancel the authenticated user's registration for an event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Event ID
      responses:
        200:
          description: Registration cancelled successfully
        401:
          description: Unauthorized

components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        location:
          type: string
        banner_url:
          type: string
        max_participants:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        status:
          type: string
          enum: [upcoming, ongoing, completed, cancelled]
        created_by:
          type: string
          format: uuid
        registered_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

