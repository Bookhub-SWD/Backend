tags:
  - name: Borrowing
    description: Book borrowing and physical copy management

paths:
  /borrow/request:
    post:
      summary: User requests to borrow a book
      tags: [Borrowing]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [book_id]
              properties:
                book_id: { type: integer }
      responses:
        '201':
          description: Request created successfully (returns request_code)
        '400':
          description: Already has active request/borrow, no copies available, or invalid input

  /borrow/approve:
    post:
      summary: Librarian approves a borrow request (Staff only)
      tags: [Borrowing]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_code]
              properties:
                request_code: { type: string, description: "Code from user's app" }
                days_to_borrow: { type: integer, default: 14 }
      responses:
        '200':
          description: Borrow approved
        '404':
          description: Request not found or invalid status

  /borrow/return:
    post:
      summary: Librarian records book return (Staff only)
      tags: [Borrowing]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [barcode]
              properties:
                barcode: { type: string, description: "Physical book barcode" }
      responses:
        '200':
          description: Book returned successfully
        '404':
          description: Copy or active borrow record not found

  /borrow/cancel:
    post:
      summary: Librarian cancels/rejects a borrow request (Staff only)
      tags: [Borrowing]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_code]
              properties:
                request_code: { type: string }
                note: { type: string, description: "Reason for cancellation/rejection" }
      responses:
        '200':
          description: Request cancelled successfully
        '404':
          description: Request not found or not in 'requested' status

  /borrow/me:
    get:
      summary: Get current user's borrow history and active requests
      tags: [Borrowing]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of borrow records

  /borrow/all:
    get:
      summary: Get all borrow records (Admin/Staff only)
      tags: [Borrowing]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all borrow records
        '403':
          description: Forbidden

components:
  schemas:
    StatusDefinitions:
      description: |
        ### Status Reference
        
        **book_copies.status**
        * `available`: Ready to be borrowed.
        * `borrowed`: Currently with a user.
        * `reserved`: Held for a specific user (request approved or notified from queue).
        * `lost`: Copy is missing.
        
        **borrow_records.status**
        * `requested`: User has requested to borrow, waiting for librarian scan.
        * `borrowed`: Active borrow.
        * `returned`: Book has been returned successfully.
        * `overdue`: Past the due date and not returned.
        * `cancelled`: Request was cancelled (by user or staff/librarian). Check `note` for reason.
